---
# Pipeline 1: vSphere UI deployment with LSO, ODF, EC 2+2, 5 OSD nodes (4+2 + 1 for redundancy)
# Covers: Req #1 (UI + LSO + ODF), Req #5 (2+2 EC with +1 redundancy nodes)
# Masters are not schedulable
DEPLOYMENT:
  allow_lower_instance_requirements: false
  local_storage: true
  type: 'VMDK'
  provision_type: 'thick'
  ui_deployment: true
  ec_default_pools: true
  ec_data_chunks: 2
  ec_coding_chunks: 2
  ec_failure_domain: host
ENV_DATA:
  mark_masters_schedulable: false
  platform: 'vsphere'
  deployment_type: 'upi'
  worker_replicas: 5
  master_replicas: 3
  worker_num_cpus: "16"
  master_num_cpus: "4"
  master_memory: "16384"
  compute_memory: "65536"
  fio_storageutilization_min_mbps: 10.0
REPORTING:
  polarion:
    deployment_id: 'OCS-8028'
